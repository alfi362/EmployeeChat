<!DOCTYPE html>
<html>
<head>
  <title>Employee Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Channels</h3>
    <div class="channel" onclick="switchChannel('engineering')"># engineering</div>
    <div class="channel" onclick="switchChannel('hr')"># hr</div>
  </div>

  <!-- Chat Area -->
  <div class="chat">
    
    <div id="header" class="header"># engineering</div>

    <div id="messages" class="messages"></div>

    <div class="input-box">
      <input type="text" id="msg" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
