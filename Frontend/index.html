<!DOCTYPE html>
<html>
<head>
  <title>Employee Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
   <h3>Company Channels</h3>
    <div class="channel" onclick="switchChannel('open-channel')">
      # open-channel <span id="badge-open-channel" class="badge">0</span>
    </div>
    <div class="channel" onclick="switchChannel('engineering')">
      # Hr <span id="badge-Hr" class="badge">0</span>
    </div>
    <h3>Direct Messages</h3>
    <div id="dm-list"></div>
    <button onclick="startNewDM()" class="dm-btn">
      + New DM
    </button>

    <!-- HR PANEL -->
    <div id="hr-panel" style="display:none; margin-top:20px;">
      <h3>HR Announcements</h3>

      <textarea id="announcementText" placeholder="Type announcement..."></textarea>

      <select id="priority">
        <option value="normal">Normal</option>
        <option value="urgent">Urgent</option>
      </select>

      <button onclick="sendAnnouncement()" class="dm-btn">
        Send Announcement
      </button>
    </div>

  </div>
  <!-- Chat Area -->
  <div class="chat">
    <div id="header" class="header">
      <span id="channel-title"># open-channel</span>
      <span id="status" class="status">Disconnected</span>
    </div>
    <div id="messages" class="messages"></div>
    <div class="input-box">
      <input type="text" id="msg" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
